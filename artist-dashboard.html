<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <div class="dashboard">

    <div class="top-nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="admin.html">Admin Panel</a>
    </div>

    <h1>🎵 Artist Dashboard</h1>

    <div class="stats">
      <div class="card">
        <h2 id="totalSongs">0</h2>
        <p>Total Songs</p>
      </div>
      <div class="card">
        <h2 id="totalPlays">0</h2>
        <p>Total Plays</p>
      </div>
    </div>

    <div class="card">

      <input type="text" id="songTitle" placeholder="Song Title">

      <input type="text" id="artistName" placeholder="Artist Name">

      <input type="file" id="songFile" accept="audio/*">

      <input type="file" id="coverFile" accept="image/*">

      <button id="uploadBtn">Upload Music</button>

    </div>

    <div class="songs-section">

      <h2>Uploaded Songs</h2>

      <div id="songsContainer"></div>

    </div>

  </div>

  <script src="dashboard.js"></script>
</body>

</html>
